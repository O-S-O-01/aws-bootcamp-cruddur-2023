tasks:
  - name: setup-environment
    init: |
      cp .env.gitpod .env
      echo "✅ Environment configured for Gitpod"
  - name: aws-cli
    env:
      AWS_CLI_AUTO_PROMPT: on-partial
    init: |
      cd /workspace
      curl "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "awscliv2.zip"
      unzip awscliv2.zip
      sudo ./aws/install
      cd $THEIA_WORKSPACE_ROOT
  - name:postgresql
    init: |
      curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo gpg --dearmor -o /usr/share/keyrings/postgresql-archive-keyring.gpg
      echo "deb https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" | sudo tee /etc/apt/sources.list.d/pgdg.list > /dev/null
      sudo apt update
      sudo apt install postgresql postgresql-contrib -y
      sudo systemctl start postgresql
      sudo systemctl enable postgresql
      sudo -u postgres psql -c "CREATE USER docker WITH PASSWORD 'docker';"
      sudo -u postgres createdb docker
      sudo -u postgres psql -c "ALTER USER docker CREATEDB;"
      echo "✅ PostgreSQL installed and configured"
  - name: react-js
    command: |
      cd frontend-react-js
      npm install
      echo "✅ React.js dependencies installed"
    command: | 
      export GITPOD_IP=$(curl -s ifconfig.me)
      source "$THEIA_WORKSPACE_ROOT/backend-flask/db-update-sg-rule"
        
vscode:
  extensions:
    - 42Crunch.vscode-openapi
    - cweijan.vscode-postgresql-client2

ports:
  - name: frontend
    port: 3000
    onOpen: open-browser
    visibility: public
  - name: backend
    port: 4567
    visibility: public
  - name: xray-daemon
    port: 2000
    visibility: public